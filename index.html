<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Dagazz</title>

<style>

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0b0f14;
  color:white;
  padding:30px;
}

/* ================= SPLASH ================= */
#splash{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0b0f14;
  z-index:9999;
}

#splash-logo{
  position:absolute;
  top:50%;
  left:50%;
  width:220px;
  transform:translate(-50%,-50%);
  animation:moveLogo 2.3s ease-in-out forwards;
}

@keyframes moveLogo{
  0%{
    top:50%;
    left:50%;
    width:220px;
    transform:translate(-50%,-50%);
  }

  60%{
    top:40px;
    left:60px;
    width:150px;
  }

  100%{
    top:30px;
    left:40px;
    width:100px;
    transform:translate(0,0);
  }
}

#content{
  display:none;
}

/* ================= HEADER ================= */
.top{
  display:flex;
  align-items:center;
  margin-bottom:25px;
}

.logo{
  height:100px;
}

/* ================= TITRE ================= */
h1{
  font-size:42px;
  margin-bottom:10px;
}

.subtitle{
  color:#9aa4b2;
  margin-bottom:30px;
}

/* ================= CARDS ================= */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card{
  background:#141a22;
  border-radius:16px;
  padding:20px;
}

/* COLORS */
.basic{border:1px solid #2a2f3a;}
.bronze{border:2px solid #cd7f32;}
.argent{border:2px solid #c0c0c0;}
.or{border:2px solid gold;}

/* TEXT */
.head{font-size:22px;font-weight:bold;}
.speed{color:#9aa4b2;}
.price{font-size:30px;font-weight:bold;}
.duration{color:#f5c542;font-size:13px;margin-bottom:15px;}

.info{
  font-size:13px;
  color:#cbd5e1;
  line-height:1.6;
}

/* ================= BUTTON ================= */
.btn{
  display:block;
  width:100%;
  padding:12px;
  border-radius:10px;
  background:#2563eb;
  color:white;
  text-align:center;
  font-weight:bold;
  text-decoration:none;
  margin-bottom:15px;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

</style>

</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="dagazwifi.png" id="splash-logo">
</div>

<!-- CONTENT -->
<div id="content">

<div class="top">
  <img src="dagazwifi.png" class="logo">
</div>

<h1>Sélectionnez l’offre</h1>
<p class="subtitle">Abonnement WiFi 24H</p>

<div class="cards">

<!-- BASIQUE -->
<div class="card basic">
  <div class="head">Basique</div>
  <div class="speed">1.5 Mbit/s</div>
  <div class="price">250 FCFA</div>
  <div class="duration">Valable 24H</div>

  <a href="paiement.html?plan=Basique&prix=250" class="btn">
    Acheter
  </a>

  <div class="info">Navigation normale</div>
</div>

<!-- STANDARD -->
<div class="card bronze">
  <div class="head">Standard</div>
  <div class="speed">7 Mbit/s</div>
  <div class="price">400 FCFA</div>
  <div class="duration">Valable 24H</div>

  <a href="paiement.html?plan=Standard&prix=400" class="btn">
    Acheter
  </a>

  <div class="info">Streaming HD</div>
</div>

<!-- PREMIUM -->
<div class="card argent">
  <div class="head">Premium</div>
  <div class="speed">12 Mbit/s</div>
  <div class="price">500 FCFA</div>
  <div class="duration">Valable 24H</div>

  <a href="paiement.html?plan=Premium&prix=500" class="btn">
    Acheter
  </a>

  <div class="info">Gaming + HD</div>
</div>

<!-- LEGEND -->
<div class="card or">
  <div class="head">Légende</div>
  <div class="speed">20 Mbit/s</div>
  <div class="price">800 FCFA</div>
  <div class="duration">Valable 24H</div>

  <a href="paiement.html?plan=Legende&prix=800" class="btn">
    Acheter
  </a>

  <div class="info">Ultra rapide</div>
</div>

</div>

</div>

<script>
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("content").style.display="block";
},2300);
</script>

</body>
</html>
