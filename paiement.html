<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement WiFi</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b0f14;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      background:#111827;
      padding:25px;
      border-radius:15px;
      width:300px;
      text-align:center;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
    }

    h1{
      font-size:20px;
      margin-bottom:15px;
    }

    .price{
      font-size:28px;
      color:#22c55e;
      margin:15px 0;
      font-weight:bold;
    }

    .btn{
      display:block;
      width:100%;
      padding:12px;
      border-radius:10px;
      background:#2563eb;
      color:white;
      text-align:center;
      font-weight:bold;
      text-decoration:none;
      margin-top:15px;
      transition:0.3s;
    }

    .btn:hover{
      background:#1d4ed8;
      transform:scale(1.03);
    }

    .info{
      font-size:14px;
      opacity:0.8;
    }
  </style>

</head>

<body>

  <div class="card">

    <h1>Accès WiFi Dagazz</h1>

    <div class="info">
      Paiement pour 24 heures d'accès Internet
    </div>

    <div class="price">
      500 FCFA
    </div>

    <a href="#" class="btn">Payer maintenant</a>

  </div>

</body>

</html>
